<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalonPro SuperAdmin — Sign In</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #f85149;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    /* Glow backdrop decorations */
    .glow-circle {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }
    .glow-1 { top: -150px; left: -150px; }
    .glow-2 { bottom: -150px; right: -150px; }

    .brand {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 2;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
    }

    .brand-logo svg {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      font-size: 11px;
      color: var(--accent-hover);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 700;
      margin-top: 4px;
    }

    .login-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 2;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background-color: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s;
    }

    .btn-submit:hover {
      background-color: var(--accent-hover);
    }

    .btn-submit:disabled {
      background-color: var(--border);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    .error-alert {
      background-color: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.2);
      color: var(--danger);
      font-size: 13px;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-alert svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke: currentColor;
      stroke-width: 2.5;
    }

    /* Loading Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="brand">
      <div class="brand-logo">
        <!-- Scissor SVG -->
        <svg viewBox="0 0 24 24">
          <circle cx="6" cy="6" r="3" />
          <circle cx="6" cy="18" r="3" />
          <line x1="9.8" y1="8.2" x2="20" y2="17" />
          <line x1="9.8" y1="15.8" x2="20" y2="7" />
        </svg>
      </div>
      <h1 class="brand-title">SalonPro Admin</h1>
      <p class="brand-subtitle">Control Panel</p>
    </div>

    <div class="login-card">
      <div id="errorAlert" class="error-alert">
        <svg fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span id="errorMessage">Invalid credentials.</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="admin@salonpro.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Security Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Sign In to Terminal</span>
        </button>
      </form>
    </div>
  </div>

  <script src="admin-api.js"></script>
  <script>
    // Redirect immediately if already authenticated
    if (localStorage.getItem('admin_token')) {
      window.location.href = 'admin.html';
    }

    const form = document.getElementById('loginForm');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const btnSubmit = document.getElementById('btnSubmit');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear alert and set loading state
      errorAlert.style.display = 'none';
      spinner.style.display = 'inline-block';
      btnSubmit.disabled = true;
      btnText.textContent = 'Verifying...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const data = await adminApi('/admin/login', {
          method: 'POST',
          body: { email, password }
        });

        if (data && data.token) {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_email', email);
          window.location.href = 'admin.html';
        } else {
          throw new Error('Authentication returned an invalid response.');
        }
      } catch (err) {
        console.error('Login error:', err);
        errorMessage.textContent = err.message || 'Invalid credentials or server offline.';
        errorAlert.style.display = 'flex';
        
        // Reset button state
        spinner.style.display = 'none';
        btnSubmit.disabled = false;
        btnText.textContent = 'Sign In to Terminal';
      }
    });
  </script>
</body>
</html>
